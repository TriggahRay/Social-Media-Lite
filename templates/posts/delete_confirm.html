{% extends 'base.html' %}
{% block title %}Delete Post · Thee Social{% endblock %}

{% block content %}
<div class="container" style="max-width:480px;padding-top:60px;">
  <div class="card text-center">
    <div class="card-body py-5">
      <i class="bi bi-trash" style="font-size:2.5rem;color:var(--danger);"></i>
      <h5 class="mt-3" style="font-weight:700;">Delete this post?</h5>
      <p style="color:var(--text-secondary);">
        This action cannot be undone. The post and all its likes and comments will be permanently deleted.
      </p>
      <div class="d-flex gap-2 justify-content-center mt-4">
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4">Yes, delete it</button>
        </form>
        <a href="{% url 'posts:feed' %}" class="btn btn-secondary px-4">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
